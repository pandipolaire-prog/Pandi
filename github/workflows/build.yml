name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Donner les permissions au script Gradle
        run: chmod +x ./gradlew

      - name: Compiler l'APK Debug
        run: ./gradlew assembleDebug

      - name: Sauvegarder l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: Mon-Application-APK
          path: app/build/outputs/apk/debug/app-debug.apk

